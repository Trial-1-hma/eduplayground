# Render Blueprint for the EduPlayground backend (Express + WebSocket).
# Render injects PORT automatically; server.js already reads process.env.PORT.
services:
  - type: web
    name: eduplayground-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      # Set this in the Render dashboard (do NOT commit the token).
      - key: GITHUB_TOKEN
        sync: false
